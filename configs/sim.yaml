robot:
  variant: g1_29dof
  idl_mode: 0

policy:
  default_policy: "assets/policies/stance_29dof.onnx"
  default_ka: 0.3
  observed_joints: null
  controlled_joints: null
  use_onnx_metadata: true
  use_estimator: true

control:
  policy_frequency: 50
  sim_frequency: 500
  kd_damp: 8.0
  transition_steps: 5
  q_home: null

safety:
  joint_position_limits: true
  joint_velocity_limits: true
  torque_limits: true

network:
  interface: "auto"
  domain_id: 1

viewer:
  enabled: true
  sync: true

logging:
  enabled: true
  format: hdf5
  compression: gzip
  log_frequency: 50
