# Unitree G1 Deployment Stack — Docker Compose profiles
#
# Run from repo root:
#   docker compose -f docker/docker-compose.yml --profile headless run --rm sim-headless \
#       sim --policy assets/policies/stance_29dof.onnx --duration 10
#   docker compose -f docker/docker-compose.yml --profile headless run --rm eval \
#       eval --steps 500 --policy assets/policies/stance_29dof.onnx
#   docker compose -f docker/docker-compose.yml --profile viser run --rm sim-viser \
#       sim --viser --policy assets/policies/stance_29dof.onnx
#   docker compose -f docker/docker-compose.yml --profile viser run --rm mirror \
#       mirror --viser --interface eth0
#   docker compose -f docker/docker-compose.yml --profile gui run --rm sim-gui \
#       sim --policy assets/policies/stance_29dof.onnx
#   docker compose -f docker/docker-compose.yml --profile real run --rm real-robot \
#       real --policy assets/policies/stance_29dof.onnx --interface eth0
#   docker compose -f docker/docker-compose.yml --profile test run --rm test

services:
  # ── Headless simulation (macOS + Linux) ────────────────────────────
  sim-headless:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    profiles: [headless]
    environment:
      - MUJOCO_GL=egl
    volumes:
      - ../logs:/app/logs
      - ../assets/policies:/app/assets/policies:ro

  # ── Headless evaluation at 1000 Hz (macOS + Linux) ────────────────
  eval:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    profiles: [headless]
    environment:
      - MUJOCO_GL=egl
    volumes:
      - ../logs:/app/logs
      - ../assets/policies:/app/assets/policies:ro

  # ── GUI simulation via X11 (Linux only) ────────────────────────────
  sim-gui:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    profiles: [gui]
    environment:
      - MUJOCO_GL=glx
      - DISPLAY=${DISPLAY}
    volumes:
      - ../logs:/app/logs
      - ../assets/policies:/app/assets/policies:ro
      - /tmp/.X11-unix:/tmp/.X11-unix

  # ── Real robot (Linux only, host networking for DDS) ───────────────
  real-robot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        BUILD_CPP_BACKEND: 1
    profiles: [real]
    network_mode: host
    environment:
      - MUJOCO_GL=egl
    volumes:
      - ../logs:/app/logs
      - ../assets/policies:/app/assets/policies:ro

  # ── Viser web viewer (macOS + Linux) ──────────────────────────────
  sim-viser:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    profiles: [viser]
    environment:
      - MUJOCO_GL=egl
    ports:
      - "${VISER_PORT:-8080}:8080"
    volumes:
      - ../logs:/app/logs
      - ../assets/policies:/app/assets/policies:ro

  # ── Mirror real robot via viser (Linux, host networking for DDS) ──
  mirror:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    profiles: [viser]
    network_mode: host
    environment:
      - MUJOCO_GL=egl

  # ── Test runner ────────────────────────────────────────────────────
  test:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    profiles: [test]
    environment:
      - MUJOCO_GL=egl
    entrypoint: ["python", "-m", "pytest"]
    command: ["tests/", "-v"]
